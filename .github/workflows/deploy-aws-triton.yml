name: Deploy AWS Triton Stack

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  ECR_REPOSITORY_PREFIX: ${{ vars.ECR_REPOSITORY_PREFIX }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required repository variables
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for name in AWS_REGION EKS_CLUSTER_NAME ECR_REPOSITORY_PREFIX; do
            if [ -z "${!name:-}" ]; then
              echo "Missing repository variable: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist
        shell: bash
        run: |
          set -euo pipefail
          prefix="${ECR_REPOSITORY_PREFIX}"

          for repo in "${prefix}/router" "${prefix}/triton-adapter" "${prefix}/triton-qwen3"; do
            if aws ecr describe-repositories --repository-names "$repo" >/dev/null 2>&1; then
              echo "ECR repository exists: $repo"
            else
              echo "Creating ECR repository: $repo"
              aws ecr create-repository --repository-name "$repo" >/dev/null
            fi
          done

      - name: Set image names
        id: images
        shell: bash
        run: |
          set -euo pipefail
          registry="${{ steps.login-ecr.outputs.registry }}"
          prefix="${ECR_REPOSITORY_PREFIX}"
          tag="${GITHUB_SHA}"

          echo "router=${registry}/${prefix}/router:${tag}" >> "$GITHUB_OUTPUT"
          echo "adapter=${registry}/${prefix}/triton-adapter:${tag}" >> "$GITHUB_OUTPUT"
          echo "triton=${registry}/${prefix}/triton-qwen3:${tag}" >> "$GITHUB_OUTPUT"

      - name: Build and push router image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.router
          push: true
          tags: ${{ steps.images.outputs.router }}

      - name: Build and push Triton adapter image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.triton-adapter
          push: true
          tags: ${{ steps.images.outputs.adapter }}

      - name: Build and push Triton image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.triton
          push: true
          tags: ${{ steps.images.outputs.triton }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        shell: bash
        run: aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"

      - name: Deploy manifests
        shell: bash
        run: |
          set -euo pipefail
          kubectl apply -f k8s/triton.yaml
          kubectl apply -f k8s/triton-adapter.yaml
          kubectl apply -f k8s/router.yaml

      - name: Pin deployment images to current build
        shell: bash
        run: |
          set -euo pipefail
          kubectl set image deployment/triton triton="${{ steps.images.outputs.triton }}"
          kubectl set image deployment/triton-adapter triton-adapter="${{ steps.images.outputs.adapter }}"
          kubectl set image deployment/inferflow-router router="${{ steps.images.outputs.router }}"

      - name: Wait for rollouts
        shell: bash
        run: |
          set -euo pipefail
          kubectl rollout status deployment/triton --timeout=40m
          kubectl rollout status deployment/triton-adapter --timeout=10m
          kubectl rollout status deployment/inferflow-router --timeout=10m

      - name: Smoke test router service
        shell: bash
        run: |
          set -euo pipefail
          kubectl run inferflow-smoke \
            --rm --restart=Never --image=curlimages/curl:8.7.1 \
            --command -- \
            sh -c 'curl -fsS http://inferflow-router.default.svc.cluster.local/healthz && \
                   curl -fsS http://inferflow-router.default.svc.cluster.local/readyz && \
                   curl -fsS http://inferflow-router.default.svc.cluster.local/v1/chat/completions \
                     -H "Content-Type: application/json" \
                     -d "{\"model\":\"qwen3-0.6b\",\"messages\":[{\"role\":\"user\",\"content\":\"Explain InferFlow in one sentence.\"}]}"'
