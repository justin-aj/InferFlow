apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: vllm-worker
spec:
  scaleTargetRef:
    kind: StatefulSet
    name: vllm-worker
  minReplicaCount: 1
  maxReplicaCount: 2
  cooldownPeriod: 300
  pollingInterval: 30
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-operated.default.svc.cluster.local:9090
        metricName: inferflow_inflight_requests
        query: max(inferflow_inflight_requests)
        threshold: "4"
