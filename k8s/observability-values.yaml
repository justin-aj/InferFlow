# Starter Helm values for the EKS + vLLM deployment path.
# Adjust service names to match the chart release names in your cluster.

grafana:
  enabled: true

prometheus:
  enabled: true
  prometheusSpec:
    additionalScrapeConfigs:
      - job_name: inferflow-router
        metrics_path: /metrics
        static_configs:
          - targets:
              - inferflow-router.default.svc.cluster.local:80
