apiVersion: v1
kind: Service
metadata:
  name: vllm-worker
spec:
  clusterIP: None
  selector:
    app: vllm-worker
  ports:
    - name: adapter
      port: 9000
      targetPort: 9000
    - name: llama-cpp
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vllm-worker
  labels:
    app: vllm-worker
spec:
  serviceName: vllm-worker
  replicas: 3
  selector:
    matchLabels:
      app: vllm-worker
  template:
    metadata:
      labels:
        app: vllm-worker
    spec:
      nodeSelector:
        inferflow/node-pool: vllm
      containers:
        - name: adapter
          image: 310429010516.dkr.ecr.us-east-1.amazonaws.com/inferflow:vllm-adapter
          imagePullPolicy: IfNotPresent
          env:
            - name: LLAMA_ADAPTER_ADDR
              value: ":9000"
            - name: LLAMA_BASE_URL
              value: "http://127.0.0.1:8080"
            - name: LLAMA_MODEL_NAME
              value: "Qwen/Qwen2.5-0.5B-Instruct"
          ports:
            - containerPort: 9000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9000
        - name: llama-cpp
          image: 310429010516.dkr.ecr.us-east-1.amazonaws.com/inferflow:llama-server-v3
          imagePullPolicy: IfNotPresent
          args:
            - "--hf-repo"
            - "Qwen/Qwen2.5-0.5B-Instruct-GGUF"
            - "--hf-file"
            - "qwen2.5-0.5b-instruct-q4_k_m.gguf"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8080"
            - "--ctx-size"
            - "2048"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              cpu: "3"
              memory: "4Gi"
            limits:
              cpu: "3"
              memory: "4Gi"
