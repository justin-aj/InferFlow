apiVersion: apps/v1
kind: Deployment
metadata:
  name: inferflow-router
  labels:
    app: inferflow-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inferflow-router
  template:
    metadata:
      labels:
        app: inferflow-router
    spec:
      containers:
        - name: router
          image: inferflow/router:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: INFERFLOW_LISTEN_ADDR
              value: ":8080"
            - name: INFERFLOW_BACKENDS
              value: "http://triton-adapter.default.svc.cluster.local:9000"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: inferflow-router
spec:
  selector:
    app: inferflow-router
  ports:
    - name: http
      port: 80
      targetPort: 8080
